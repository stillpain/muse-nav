<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6857d9" />
    <script>
      try {
        document.documentElement.dataset.theme = localStorage.getItem('theme') ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      } catch (_) {
        document.documentElement.dataset.theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
    </script>
    <link rel="icon" type="image/png" sizes="64x64" href="/muse-icon-64.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="/muse-icon-256.png" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover"><div style="display: contents">%sveltekit.body%</div></body>
</html>
