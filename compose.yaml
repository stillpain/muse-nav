services:
  navigation:
    build:
      context: .
      args:
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://example.com}
        PUBLIC_BLOG_URL: ${PUBLIC_BLOG_URL:-https://blog.example.com}
        PUBLIC_SITE_NAME: ${PUBLIC_SITE_NAME:-暮色导航}
        CONTENT_SOURCE: ${CONTENT_SOURCE:-local}
    image: ${NAV_IMAGE:-twilight-beacon:local}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-example.com}
      BLOG_ORIGIN: ${BLOG_ORIGIN:-https://blog.example.com}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  caddy_data:
  caddy_config:
