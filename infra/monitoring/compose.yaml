services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    ports: ["127.0.0.1:3001:3001"]
    volumes: [uptime_data:/app/data]
    security_opt: [no-new-privileges:true]
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

volumes:
  uptime_data:
