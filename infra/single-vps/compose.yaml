services:
  edge:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      muse: { condition: service_healthy }
    ports: ["80:80", "443:443", "443:443/udp"]
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?required}
      WWW_DOMAIN: ${WWW_DOMAIN:-www.musedaohang.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - edge_data:/data
      - edge_config:/config
    networks: [web]
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  muse:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: muse-app:local
    restart: unless-stopped
    environment:
      MUSE_ADMIN_PASSWORD: ${MUSE_ADMIN_PASSWORD:?required}
      MUSE_SESSION_SECRET: ${MUSE_SESSION_SECRET:?required}
      ORIGIN: https://${SITE_DOMAIN:?required}
      BODY_SIZE_LIMIT: 6M
    volumes: [muse_data:/app/data]
    networks: [web]
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

networks:
  web:

volumes:
  muse_data:
    name: muse_data
  edge_data:
  edge_config:
