services:
  edge:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on: [navigation, blog, wordpress]
    ports: ["80:80", "443:443"]
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?required}
      BLOG_DOMAIN: ${BLOG_DOMAIN:?required}
      CMS_DOMAIN: ${CMS_DOMAIN:?required}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - wp_data:/var/www/html:ro
      - edge_data:/data
      - edge_config:/config
    networks: [frontend, backend]
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  navigation:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:?required}
        PUBLIC_BLOG_URL: ${PUBLIC_BLOG_URL:?required}
        PUBLIC_SITE_NAME: ${PUBLIC_SITE_NAME:-暮色导航}
        CONTENT_SOURCE: ${CONTENT_SOURCE:-local}
        WORDPRESS_API_URL: ${WORDPRESS_API_URL:?required}
        WORDPRESS_TIMEOUT_MS: ${WORDPRESS_TIMEOUT_MS:-8000}
    image: muse-navigation:local
    restart: unless-stopped
    environment: { SITE_DOMAIN: ":80", BLOG_ORIGIN: "${CMS_URL:?required}" }
    networks: [frontend]
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  blog:
    build:
      context: ../..
      dockerfile: Dockerfile.blog
      args:
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:?required}
        PUBLIC_BLOG_URL: ${PUBLIC_BLOG_URL:?required}
        PUBLIC_BLOG_NAME: ${PUBLIC_BLOG_NAME:-暮色手记}
        PUBLIC_BLOG_AUTHOR: ${PUBLIC_BLOG_AUTHOR:-暮色手记}
        CONTENT_SOURCE: ${CONTENT_SOURCE:-local}
        WORDPRESS_API_URL: ${WORDPRESS_API_URL:?required}
        WORDPRESS_TIMEOUT_MS: ${WORDPRESS_TIMEOUT_MS:-8000}
    image: muse-blog:local
    restart: unless-stopped
    networks: [frontend]
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  db:
    image: mariadb:11.4
    restart: unless-stopped
    command: --innodb-buffer-pool-size=256M --max-connections=60
    environment:
      MARIADB_DATABASE: ${DB_NAME:-wordpress}
      MARIADB_USER: ${DB_USER:-wordpress}
      MARIADB_PASSWORD: ${DB_PASSWORD:?required}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?required}
    volumes: [db_data:/var/lib/mysql]
    healthcheck: { test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"], interval: 20s, timeout: 5s, retries: 10 }
    networks: [backend]
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save 60 1
    volumes: [redis_data:/data]
    networks: [backend]
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  wordpress:
    image: wordpress:7.0.1-php8.3-fpm-alpine
    restart: unless-stopped
    depends_on: { db: { condition: service_healthy }, redis: { condition: service_started } }
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:?required}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_REDIS_HOST', 'redis');
        define('DISALLOW_FILE_EDIT', true);
        define('WP_DEBUG_DISPLAY', false);
        define('FORCE_SSL_ADMIN', true);
        define('WP_HOME', '${CMS_URL:?required}');
        define('WP_SITEURL', '${CMS_URL:?required}');
    volumes:
      - wp_data:/var/www/html
      - ../../wordpress/nav-content-api:/var/www/html/wp-content/plugins/nav-content-api:ro
    networks: [backend]
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

networks:
  frontend:
  backend:

volumes:
  db_data:
  redis_data:
  wp_data:
  edge_data:
  edge_config:
