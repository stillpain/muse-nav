name: Publish navigation image
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/twilight-beacon:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/twilight-beacon:stable
          build-args: |
            PUBLIC_SITE_URL=${{ vars.PUBLIC_SITE_URL }}
            PUBLIC_BLOG_URL=${{ vars.PUBLIC_BLOG_URL }}
            PUBLIC_SITE_NAME=${{ vars.PUBLIC_SITE_NAME }}
